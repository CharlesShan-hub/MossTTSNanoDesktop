<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOSS-TTS-Nano</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 13px;
  color: #1d1d1f;
  background: #f5f5f7;
  height: 100vh;
  display: flex;
  flex-direction: column;
  user-select: none;
}

/* Tab bar */
.tab-bar {
  display: flex;
  background: #fff;
  border-bottom: 1px solid #d2d2d7;
  flex-shrink: 0;
}
.tab {
  flex: 1;
  text-align: center;
  padding: 10px 0;
  font-size: 12px;
  font-weight: 500;
  color: #86868b;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.tab:hover { color: #1d1d1f; }
.tab.active {
  color: #0071e3;
  border-bottom-color: #0071e3;
}

/* Pages */
.pages { flex: 1; position: relative; }
.page {
  display: none;
  position: absolute;
  inset: 0;
  padding: 20px;
  align-items: center;
  justify-content: center;
}
.page.active { display: flex; }
.page-placeholder { color: #86868b; font-size: 13px; }

/* Status bar */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  background: #fff;
  border-top: 1px solid #d2d2d7;
  font-size: 11px;
  color: #86868b;
  flex-shrink: 0;
}
.status-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #30d158;
  margin-right: 6px;
}
.status-dot.off { background: #ff453a; }
</style>
</head>
<body>

<div class="tab-bar" id="tabBar"></div>
<div class="pages" id="pages"></div>
<div class="status-bar">
  <span><span class="status-dot" id="statusDot"></span><span id="statusText">就绪</span></span>
  <span id="statusRight"></span>
</div>

<script>
const tabs = [
  { id: 'single', label: '单次生成', icon: '🎤' },
  { id: 'book', label: '有声书', icon: '📖' },
  { id: 'voices', label: '音色管理', icon: '🎙' },
  { id: 'settings', label: '设置', icon: '⚙' },
];

let currentTab = 'single';

function render() {
  const tabBar = document.getElementById('tabBar');
  const pages = document.getElementById('pages');

  tabBar.innerHTML = tabs.map(t => `
    <div class="tab${t.id === currentTab ? ' active' : ''}" data-tab="${t.id}">
      ${t.icon} ${t.label}
    </div>
  `).join('');

  pages.innerHTML = tabs.map(t => `
    <div class="page${t.id === currentTab ? ' active' : ''}" id="page-${t.id}">
      <div class="page-placeholder">${t.label}</div>
    </div>
  `).join('');

  document.querySelectorAll('.tab').forEach(el => {
    el.addEventListener('click', () => {
      currentTab = el.dataset.tab;
      render();
    });
  });
}

render();
setInterval(() => {
  document.getElementById('statusRight').textContent = new Date().toLocaleTimeString();
}, 1000);

// ─── JS Bridge: 接收 Dart 传来的消息 ──────────────────────
window.MossBridge = {
  onStatus: (text) => {
    document.getElementById('statusText').textContent = text;
  },
  onServerOnline: (ok) => {
    document.getElementById('statusDot').className = 'status-dot' + (ok ? '' : ' off');
  },
};
</script>
</body>
</html>
